<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPE Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      transition: background 0.2s;
    }
    .title .dot.on { background: #00aa00; }
    .title .dot.off { background: #666; }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #0f0f1e;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 600;
    }
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 26px;
      transition: 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #e0e0e0;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4a90d9;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(22px);
    }

    .status {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
      padding: 0 4px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0f0f1e;
      color: #e0e0e0;
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 44px;
    }
    input:focus {
      outline: none;
      border-color: #4a90d9;
    }
    .btn-save {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #e0e0e0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: opacity 0.2s;
    }
    .btn-save:active { opacity: 0.7; }
    .info {
      margin-top: 14px;
      padding: 10px;
      background: #0f0f1e;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }
    .info code {
      color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">
      <span class="dot off" id="statusDot"></span>
      HPE Bridge
    </div>
  </div>

  <!-- Toggle on/off -->
  <div class="toggle-row">
    <span class="toggle-label">Bridge</span>
    <label class="toggle">
      <input type="checkbox" id="toggleBridge">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="statusText">Off</div>

  <label for="gatewayUrl">Gateway URL</label>
  <input type="text" id="gatewayUrl" placeholder="ws://192.168.1.100:8765" autocapitalize="off" autocorrect="off">

  <label for="password">Password (optional)</label>
  <input type="password" id="password" placeholder="Leave empty if no auth">

  <button class="btn-save" id="btnSave">Save Config</button>

  <div class="info">
    Toggle ON to connect. Default port <code>8765</code>.<br>
    <code>ws://IP:PORT</code> for LAN, <code>wss://</code> for TLS.
  </div>

  <script src="popup.js"></script>
</body>
</html>
